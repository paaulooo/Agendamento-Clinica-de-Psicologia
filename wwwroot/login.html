<!DOCTYPE html>

<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Central Administrativa</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Arial, Helvetica, sans-serif;
        }

        body {
            width: 100%;
            height: 100vh;
            background: #f4f6fb;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 18px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0,08);
        }

        .logo {
            width: 70px;
            height: 70px;
            background: #5865f2;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 30px;
            margin: auto;
            margin-bottom: 25px;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #1e293b;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 35px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #334155;
            font-size: 14px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #dbe2ea;
            border-radius: 12px;
            outline: none;
            font-size: 15px;
            transition: 0,2s;
        }

            input:focus {
                border-color: #5865f2;
                box-shadow: 0 0 0 4px rgba(88,101,242,0.12);
            }

        .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #5865f2;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0,2s;
            margin-top: 10px;
        }

        , login-btn:hover {
            opacity: 0.92;
        }

        .erro {
            margin-top: 20px;
            text-align: center;
            color: #dc2626;
            font-size: 14px;
        }

    </style>
</head>
<body>

    <div class="login-container">

        <div class="login-card">

            <div class="logo">
                +
            </div>

            <h1>
                Central Administrativa
            </h1>

            <p class="subtitle">
                Faça login para continuar
            </p>

            <div class="input-group">

                <label>Email</label>

                <input type="email"
                       id="email"
                       placeholder="Digite seu email">
            </div>

            <div class="input-group">

                <label>Senha</label>

                <input type="password"
                       id="senha"
                       placeholder="Digite sua senha">

            </div>

            <button 
                    class="login-btn"
                    onclick="login()"
            >
                Entrar
            </button>

            <div 
                 class="erro"
                 id="erro"
            ></div>

        </div>

    </div>

    <script>

        async function login() {

            const email = document.getElementById("email").value;

            const senha = document.getElementById("senha").value;

            console.log(email, senha);

            const erro = document.getElementById("erro");

            erro.innerHTML = "";

            try {

                const response = await fetch(
                    "https://localhost:7236/auth/login",
                    {
                        method: "POST",

                        headers: {
                            "Content-Type": "application/json"
                        },

                        body: JSON.stringify({
                            email: email,
                            senha: senha
                        })
                    }
                );

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem("token", data.token);
                    window.location.href = "/admin/admin.html";
                }
                else {

                    erro.innerHTML = "Email ou senha inválidos";
                }
            }
            catch (error) {

                console.log(error);

                erro.innerHTML = "Erro ao conectar com o servidor";
            }
        }

    </script>

</body>
</html>
